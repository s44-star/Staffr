<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0A0A0C;font-family:'IBM Plex Mono',monospace;-webkit-font-smoothing:antialiased}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes modalIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
@keyframes tk{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes ldr{0%{left:-40%}100%{left:110%}}
@keyframes gl{from{width:0}to{width:100%}}
.pin{animation:fadeUp .35s ease both}.min{animation:modalIn .2s ease both}
.rh:hover{background:#101014}
input::placeholder{color:#4a4a52}select option{background:#141418;color:#EDEDF0}
button{transition:opacity .15s}button:active{opacity:.75}

.blurred{filter:blur(8px);pointer-events:none;user-select:none}

<div style="width:100px;height:1px;background:#1C1C20;margin-top:22px;position:relative;overflow:hidden"><div style="position:absolute;left:0;top:0;height:1px;width:40%;background:#4A9B7F;animation:ldr 1.2s ease-in-out infinite"></div></div>

const SB_URL="https://STAFFR_PROJECT.supabase.co";
const SB_KEY="sb_publishable_STAFFR_KEY";
const sb=window.supabase.createClient(SB_URL,SB_KEY);
const FREE_EMP=3;
const CODES=["STAFFR-9999","STAFFR-PRO","CA-PARTNER"];

const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const CUR_MONTH=new Date().getMonth()+1;

border:"#1C1C20",border2:"#26262C",
em:"#4A9B7F",emS:"#357A63",

const MODS=[{id:"dash",l:"COMMAND"},{id:"employees",l:"EMPLOYEES"},{id:"payroll",l:"RUN PAYROLL"},{id:"compliance",l:"PF & ESIC"},{id:"reports",l:"REPORTS"},{id:"config",l:"CONFIG"}];
const fmt=n=>"₹"+Number(n||0).toLocaleString("en-IN",{maximumFractionDigits:0});
const fmtN=n=>Number(n||0).toLocaleString("en-IN");
function calcPay(emp,present,working){
  const wd=working||26;const pd=present||wd;
  const ratio=pd/wd;
  const basic=Number(emp.basic)*ratio;
  const hra=Number(emp.hra)*ratio;
  const allow=Number(emp.allowances)*ratio;
  const gross=basic+hra+allow;
  const pf_e=emp.pf_applicable?Math.round(basic*0.12):0;
  const pf_er=emp.pf_applicable?Math.round(basic*0.12):0;
  const esic_e=emp.esic_applicable&&gross<=21000?Math.round(gross*0.0075):0;
  const esic_er=emp.esic_applicable&&gross<=21000?Math.round(gross*0.0325):0;
  const net=Math.round(gross-pf_e-esic_e);
  return{basic:Math.round(basic),hra:Math.round(hra),allowances:Math.round(allow),gross:Math.round(gross),pf_employee:pf_e,pf_employer:pf_er,esic_employee:esic_e,esic_employer:esic_er,net_pay:net};
}
function useIsMobile(){const[m,setM]=useState(false);useEffect(()=>{const c=()=>setM(window.innerWidth<768);c();window.addEventListener("resize",c);return()=>window.removeEventListener("resize",c)},[]);return m}
function printDoc(title,co,headers,rows,summary){
  const w=window.open('','_blank');if(!w)return;
  w.document.write(`<!DOCTYPE html><html><head><title>${title}</title>
<style>body{font-family:monospace;font-size:11px;padding:24px}h2{font-size:14px;letter-spacing:2px;margin-bottom:4px}.meta{font-size:10px;color:#555;margin-bottom:14px}table{width:100%;border-collapse:collapse}th,td{border:1px solid #ccc;padding:6px 8px;text-align:left}th{background:#f0f0f0;font-size:9px;letter-spacing:1px;font-weight:700}.sum{margin-top:12px;padding:10px;border:1px solid #333;font-size:11px}.btn{margin-top:12px;padding:8px 18px;background:#000;color:#fff;border:none;cursor:pointer;font-family:monospace}@media print{.btn{display:none}}</style></head>
<body><h2>${title}</h2><div class="meta">${co||'Company'} · ${new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})} · ${rows.length} records</div>
<table><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table>
${summary?`<div class="sum">${summary}</div>`:''}
<button class="btn" onclick="window.print()">PRINT / SAVE PDF</button></body></html>`);w.document.close();}

function Logo({onSecret}){
  const taps=useRef([]);
  const tap=()=>{const n=Date.now();taps.current=taps.current.filter(t=>n-t<2500);taps.current.push(n);if(taps.current.length>=5){taps.current=[];onSecret()}};
  return(<span onClick={tap} style={{fontSize:13,fontWeight:600,letterSpacing:4,color:C.white,cursor:"default",userSelect:"none"}}>STAFFR<span style={{color:C.em}}>·</span></span>)}

function StatusBar({pro,onSecret,onLogout}){
  const[t,setT]=useState(null);
  useEffect(()=>{setT(new Date());const i=setInterval(()=>setT(new Date()),1000);return()=>clearInterval(i)},[]);
  return(<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"#070709",borderBottom:`1px solid ${C.border}`,padding:"9px 14px",position:"sticky",top:0,zIndex:100}}>
    <div style={{display:"flex",alignItems:"center",gap:10}}>
      <Logo onSecret={onSecret}/>
      <span style={{fontSize:8,color:C.label,letterSpacing:1}}>by <span style={{color:C.em}}>LEXCONV</span></span>
      {pro&&<span style={{fontSize:8,color:C.em,border:`1px solid ${C.emS}`,padding:"2px 7px",letterSpacing:2}}>PRO</span>}
    </div>
    <div style={{display:"flex",alignItems:"center",gap:8}}>
      <span style={{fontSize:11,color:C.text,letterSpacing:2}}>{t?t.toLocaleTimeString("en-IN",{hour12:false}):"--:--:--"}</span>
      {onLogout&&<button onClick={onLogout} style={{background:"none",border:`1px solid ${C.border2}`,color:C.label,fontFamily:"inherit",fontSize:8,letterSpacing:1.5,padding:"4px 8px",cursor:"pointer"}}>EXIT</button>}
    </div>
  </div>)}

function Ticker(){
  const items=[["PF DUE","15TH EVERY MONTH"],["ESIC DUE","15TH EVERY MONTH"],["OVERTIME","MAX 50 HRS/QTR"],["ESIC LIMIT","GROSS ≤ ₹21,000"],["PF RATE","12% EMPLOYER + 12% EMPLOYEE"],["FACTORIES ACT","48 HRS/WEEK MAX"]];
  return(<div style={{background:"#070709",borderBottom:`1px solid ${C.border}`,overflow:"hidden",padding:"6px 0"}}>
    <div style={{display:"inline-flex",gap:36,animation:"tk 30s linear infinite"}}>
      {[...items,...items].map((x,i)=><span key={i} style={{fontSize:9,letterSpacing:1.5,color:C.dim,whiteSpace:"nowrap"}}>{x[0]} <span style={{color:C.emS}}>{x[1]}</span></span>)}</div></div>)}

const Panel=({title,action,children,style})=>(<div className="pin" style={{background:C.panel,border:`1px solid ${C.border}`,...style}}>
  {title&&<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",borderBottom:`1px solid ${C.border}`,flexWrap:"wrap",gap:8}}>
    <span style={{fontSize:9,fontWeight:500,letterSpacing:2.5,color:C.label}}>{title}</span>{action}</div>}
  <div style={{padding:14}}>{children}</div></div>);

const Stat=({label,value,sub,dColor})=>(<div className="pin" style={{background:C.panel,border:`1px solid ${C.border}`,padding:"14px 16px",position:"relative",overflow:"hidden"}}>
  <div style={{fontSize:8,color:C.label,letterSpacing:2,marginBottom:7}}>{label}</div>
  <div style={{fontSize:18,fontWeight:500,color:C.white}}>{value}</div>
  {sub&&<div style={{fontSize:9,color:dColor||C.label,marginTop:5}}>{sub}</div>}
  <div style={{position:"absolute",bottom:0,left:0,height:1,background:`linear-gradient(90deg,${C.em},transparent)`,opacity:.6,animation:"gl .7s ease both"}}/></div>);

const Empty=({msg,cta,onCta})=>(<div style={{padding:"36px 16px",textAlign:"center"}}>
  <div style={{width:24,height:1,background:C.border2,margin:"0 auto 12px"}}/>
  <div style={{fontSize:11,color:C.label,marginBottom:cta?14:0,lineHeight:1.6}}>{msg}</div>
  {cta&&<button onClick={onCta} style={bP}>{cta}</button>}</div>);
const Scroll=({children})=><div style={{overflowX:"auto",WebkitOverflowScrolling:"touch"}}>{children}</div>;

function AuthGate({onAuthed}){
  const[mode,setMode]=useState("login");
  const[busy,setBusy]=useState(false);
  const[err,setErr]=useState("");
  const eRef=useRef(null);const pRef=useRef(null);
  const go=async()=>{
    const email=(eRef.current?.value)||"";const pw=(pRef.current?.value)||"";
    if(!email||!pw){setErr("Fill both fields");return}
    if(pw.length<6){setErr("Password: 6+ characters");return}
    setBusy(true);setErr("");
    try{
      let r=mode==="signup"?await sb.auth.signUp({email,password:pw}):await sb.auth.signInWithPassword({email,password:pw});
      if(r.error){setErr(r.error.message);setBusy(false);return}
      if(!r.data.session){const s2=await sb.auth.signInWithPassword({email,password:pw});
        if(s2.error){setErr("Account created — log in now");setMode("login");setBusy(false);return}}
      setBusy(false);onAuthed();
    }catch(e){setErr("Error: "+(e.message||"try again"));setBusy(false)}};
  return(<div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}}>
    <div style={{fontSize:20,fontWeight:600,letterSpacing:5,color:C.white,marginBottom:5}}>STAFFR<span style={{color:C.em}}>·</span></div>
    <div style={{fontSize:9,color:C.label,letterSpacing:3,marginBottom:28}}>LABOUR & PAYROLL COMPLIANCE</div>
    <div style={{width:320,maxWidth:"100%",border:`1px solid ${C.emS}`,background:"#000",padding:"26px 22px"}}>
      <div style={{display:"flex",marginBottom:20,borderBottom:`1px solid ${C.border2}`}}>
        <button onClick={()=>{setMode("login");setErr("")}} style={{flex:1,background:"none",border:"none",borderBottom:mode==="login"?`2px solid ${C.em}`:"2px solid transparent",color:mode==="login"?C.em:C.label,fontFamily:"inherit",fontSize:11,letterSpacing:2,padding:"9px 0",cursor:"pointer"}}>LOG IN</button>
        <button onClick={()=>{setMode("signup");setErr("")}} style={{flex:1,background:"none",border:"none",borderBottom:mode==="signup"?`2px solid ${C.em}`:"2px solid transparent",color:mode==="signup"?C.em:C.label,fontFamily:"inherit",fontSize:11,letterSpacing:2,padding:"9px 0",cursor:"pointer"}}>SIGN UP</button>
      </div>
      <div style={{fontSize:8,color:C.label,letterSpacing:2,marginBottom:5}}>EMAIL</div>
      <input ref={eRef} type="email" autoComplete="email" placeholder="you@company.com" style={{...inp,marginBottom:12}}/>
      <div style={{fontSize:8,color:C.label,letterSpacing:2,marginBottom:5}}>PASSWORD</div>
      <input ref={pRef} type="password" autoComplete="current-password" onKeyDown={e=>e.key==="Enter"&&go()} placeholder="••••••" style={{...inp,marginBottom:16}}/>
      <button onClick={go} disabled={busy} style={{...bP,width:"100%",opacity:busy?.6:1}}>{busy?"PLEASE WAIT...":(mode==="signup"?"CREATE ACCOUNT →":"ENTER →")}</button>
      {err&&<div style={{fontSize:12,color:"#FF6B6B",marginTop:12,fontWeight:500}}>{err}</div>}
      {mode==="signup"&&<div style={{fontSize:8,color:C.dim,marginTop:10,letterSpacing:1}}>{FREE_EMP} FREE EMPLOYEES · NO CARD NEEDED</div>}
    </div></div>)}

function Paywall({onUnlock}){
  const[code,setCode]=useState("");const[err,setErr]=useState(false);
  const try_=()=>{const cc=code.trim().toUpperCase();if(CODES.includes(cc)||cc===GOD){onUnlock()}else{setErr(true);setTimeout(()=>setErr(false),1800)}};
  return(<div style={{position:"fixed",inset:0,background:"rgba(7,7,9,.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:2000,backdropFilter:"blur(2px)",padding:16,overflow:"auto"}}>
    <div className="min" style={{background:C.bg,border:`1px solid ${C.emS}`,width:400,maxWidth:"100%",textAlign:"center",padding:"36px 26px",position:"relative"}}>
      <div style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:50,height:1,background:C.em}}/>
      <div style={{fontSize:9,color:C.label,letterSpacing:3,marginBottom:5}}>COMPLIMENTARY ACCESS CONCLUDED</div>
      <div style={{fontSize:17,fontWeight:600,color:C.white,letterSpacing:2,marginBottom:22}}>CONTINUE WITH STAFFR PRO</div>
      <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:18}}>
        {[["SINGLE UNIT","₹4,999","/year","up to 25 employees"],["MILL / FACTORY","₹14,999","/year","up to 200 employees"],["ENTERPRISE","₹49,999","/year","unlimited employees"]].map((p,i)=>(
          <a key={i} href={`https://wa.me/917978474991?text=${encodeURIComponent("Hi, I want STAFFR "+p[0]+" plan ("+p[1]+p[2]+"). Please share details.")}`} target="_blank" style={{textDecoration:"none",background:C.bg2,border:`1px solid ${i===0?C.emS:C.border2}`,padding:"13px",display:"block",position:"relative"}}>
            {i===0&&<div style={{position:"absolute",top:-8,right:12,background:C.em,color:"#0A0A0C",fontSize:7,fontWeight:700,letterSpacing:1.5,padding:"3px 8px"}}>PREFERRED</div>}
            <div style={{fontSize:8,color:C.label,letterSpacing:2,marginBottom:3}}>{p[0]}</div>
            <div style={{fontSize:21,fontWeight:500,color:i===0?C.em:C.white}}>{p[1]}<span style={{fontSize:10,color:C.label}}>{p[2]}</span></div>
            <div style={{fontSize:8,color:C.dim,marginTop:3}}>{p[3].toUpperCase()}</div></a>))}
      </div>
      <div style={{display:"flex",gap:8,marginBottom:8}}>
        <input placeholder="ACCESS CODE" value={code} onChange={e=>setCode(e.target.value)} onKeyDown={e=>e.key==="Enter"&&try_()} style={{...inp,textAlign:"center",letterSpacing:2,borderColor:err?C.bad:C.border2}}/>
        <button onClick={try_} style={{...bP,whiteSpace:"nowrap"}}>ENTER</button>
      </div>
      {err&&<div style={{fontSize:9,color:C.bad}}>INVALID CODE</div>}
    </div></div>)}

function SecretEntry({onClose,onUnlock}){
  const[code,setCode]=useState("");const[err,setErr]=useState(false);
  const try_=()=>{const cc=code.trim().toUpperCase();if(CODES.includes(cc)||cc===GOD){onUnlock();onClose()}else{setErr(true);setTimeout(()=>setErr(false),1800)}};
  return(<div style={{position:"fixed",inset:0,background:"rgba(7,7,9,.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:3000,padding:16}} onClick={onClose}>
    <div className="min" onClick={e=>e.stopPropagation()} style={{background:C.bg,border:`1px solid ${C.emS}`,width:290,maxWidth:"100%",padding:"24px 20px",textAlign:"center"}}>
      <div style={{fontSize:9,color:C.label,letterSpacing:3,marginBottom:14}}>MASTER ACCESS</div>
      <input autoFocus placeholder="ENTER CODE" value={code} onChange={e=>setCode(e.target.value)} onKeyDown={e=>e.key==="Enter"&&try_()} style={{...inp,textAlign:"center",letterSpacing:3,marginBottom:12,borderColor:err?C.bad:C.border2}}/>
      <button onClick={try_} style={{...bP,width:"100%"}}>AUTHORISE</button>
      {err&&<div style={{fontSize:9,color:C.bad,marginTop:8}}>INVALID</div>}
    </div></div>)}

function Dashboard({emps,payroll}){
  const active=emps.filter(e=>e.active);
  const thisMonth=payroll.filter(p=>p.month===CUR_MONTH&&p.year===CUR_YEAR);
  const totalGross=thisMonth.reduce((s,p)=>s+Number(p.basic)+Number(p.hra)+Number(p.allowances),0);
  const totalPF=thisMonth.reduce((s,p)=>s+Number(p.pf_employee)+Number(p.pf_employer),0);
  const totalESIC=thisMonth.reduce((s,p)=>s+Number(p.esic_employee)+Number(p.esic_employer),0);
  const totalNet=thisMonth.reduce((s,p)=>s+Number(p.net_pay),0);
  return(<div style={{display:"flex",flexDirection:"column",gap:10}}>
    <div className="g4">
      <Stat label="TOTAL EMPLOYEES" value={active.length} sub="active on roster"/>
      <Stat label="GROSS PAYROLL" value={fmt(totalGross)} sub={MONTHS[CUR_MONTH-1]+" "+CUR_YEAR}/>
      <Stat label="PF LIABILITY" value={fmt(totalPF)} sub="employer + employee" dColor={C.warn}/>
      <Stat label="ESIC LIABILITY" value={fmt(totalESIC)} sub="employer + employee" dColor={C.warn}/>
    </div>
    <div className="g2">
      <Stat label="NET PAYABLE TO EMPLOYEES" value={fmt(totalNet)} sub="this month"/>
      <div className="pin" style={{background:C.panel,border:`1px solid ${C.border}`,padding:"14px 16px"}}>
        <div style={{fontSize:8,color:C.label,letterSpacing:2,marginBottom:10}}>COMPLIANCE DUES</div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:10,padding:"5px 0",borderBottom:`1px solid ${C.border}`}}><span style={{color:C.label}}>PF Challan Due</span><span style={{color:C.warn}}>15th {MONTHS[CUR_MONTH-1]}</span></div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:10,padding:"5px 0"}}><span style={{color:C.label}}>ESIC Challan Due</span><span style={{color:C.warn}}>15th {MONTHS[CUR_MONTH-1]}</span></div>
      </div>
    </div>
  </div>)}

function Employees({emps,onAdd,onEdit,pro,godPro}){
  const walled=!pro&&!godPro&&emps.length>=FREE_EMP;
  return(<Panel title="EMPLOYEE ROSTER" action={<button onClick={walled?null:onAdd} style={{...bP,opacity:walled?.4:1}}>+ ADD</button>}>
    {emps.length===0?<Empty msg="No employees on record. Add your first employee." cta="ADD EMPLOYEE" onCta={onAdd}/>:
    <Scroll><table style={tbl}><thead><tr style={trH}><th style={th}>NAME</th><th style={th}>DESIGNATION</th><th style={thR}>BASIC</th><th style={thR}>HRA</th><th style={thR}>GROSS</th><th style={thC}>PF</th><th style={thC}>ESIC</th></tr></thead><tbody>
    {emps.filter(e=>e.active).map((e,i)=>(<tr key={i} className="rh" style={{borderBottom:`1px solid ${C.border}`,transition:"background .15s",cursor:"pointer"}} onClick={()=>onEdit(e)}>
      <td style={{...td,color:C.em,fontWeight:500}}>{e.name}</td>
      <td style={{...td,color:C.label}}>{e.designation||"—"}</td>
      <td style={tdR}>{fmt(e.basic)}</td>
      <td style={tdR}>{fmt(e.hra)}</td>
      <td style={{...tdR,fontWeight:500}}>{fmt(Number(e.basic)+Number(e.hra)+Number(e.allowances))}</td>
      <td style={tdC}><span style={{fontSize:8,color:e.pf_applicable?C.ok:C.dim,border:`1px solid ${e.pf_applicable?C.ok:C.dim}55`,padding:"3px 6px"}}>{e.pf_applicable?"YES":"NO"}</span></td>
      <td style={tdC}><span style={{fontSize:8,color:e.esic_applicable?C.ok:C.dim,border:`1px solid ${e.esic_applicable?C.ok:C.dim}55`,padding:"3px 6px"}}>{e.esic_applicable?"YES":"NO"}</span></td>
    </tr>))}</tbody></table></Scroll>}
  </Panel>)}

function PayrollRun({emps,payroll,onRun,month,setMonth,year,setYear}){
  const run=payroll.filter(p=>p.month===month&&p.year===year);
  const hasRun=run.length>0;
  return(<div style={{display:"flex",flexDirection:"column",gap:10}}>
    <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
      <select value={month} onChange={e=>setMonth(Number(e.target.value))} style={{...inp,width:"auto"}}>
        {MONTHS.map((m,i)=><option key={i} value={i+1}>{m}</option>)}</select>
      <select value={year} onChange={e=>setYear(Number(e.target.value))} style={{...inp,width:"auto"}}>
        {[2024,2025,2026,2027].map(y=><option key={y} value={y}>{y}</option>)}</select>
      {!hasRun&&emps.length>0&&<button onClick={()=>onRun(month,year)} style={bP}>RUN PAYROLL →</button>}
    </div>
    {run.length===0?<Empty msg={hasRun?"No payroll data for this period.":"Select month and run payroll to generate."}/>:
    <Panel title={`PAYROLL · ${MONTHS[month-1].toUpperCase()} ${year}`}>
      <Scroll><table style={tbl}><thead><tr style={trH}><th style={th}>EMPLOYEE</th><th style={thR}>BASIC</th><th style={thR}>HRA</th><th style={thR}>GROSS</th><th style={thR}>PF (EMP)</th><th style={thR}>ESIC (EMP)</th><th style={thR}>NET PAY</th></tr></thead><tbody>
      {run.map((p,i)=>(<tr key={i} style={{borderBottom:`1px solid ${C.border}`}}>
        <td style={{...td,color:C.em}}>{emps.find(e=>e._dbid===p.employee_id)?.name||"—"}</td>
        <td style={tdR}>{fmt(p.basic)}</td>
        <td style={tdR}>{fmt(p.hra)}</td>
        <td style={tdR}>{fmt(Number(p.basic)+Number(p.hra)+Number(p.allowances))}</td>
        <td style={{...tdR,color:C.warn}}>{fmt(p.pf_employee)}</td>
        <td style={{...tdR,color:C.warn}}>{fmt(p.esic_employee)}</td>
        <td style={{...tdR,fontWeight:600,color:C.ok}}>{fmt(p.net_pay)}</td>
      </tr>))}
      <tr style={{borderTop:`1px solid ${C.emS}`}}>
        <td style={{...td,fontWeight:700,color:C.em}}>TOTAL</td>
        <td style={tdR}>{fmt(run.reduce((s,p)=>s+Number(p.basic),0))}</td>
        <td style={tdR}>{fmt(run.reduce((s,p)=>s+Number(p.hra),0))}</td>
        <td style={tdR}>{fmt(run.reduce((s,p)=>s+Number(p.basic)+Number(p.hra)+Number(p.allowances),0))}</td>
        <td style={{...tdR,color:C.warn}}>{fmt(run.reduce((s,p)=>s+Number(p.pf_employee),0))}</td>
        <td style={{...tdR,color:C.warn}}>{fmt(run.reduce((s,p)=>s+Number(p.esic_employee),0))}</td>
        <td style={{...tdR,fontWeight:700,color:C.ok}}>{fmt(run.reduce((s,p)=>s+Number(p.net_pay),0))}</td>
      </tr></tbody></table></Scroll>
    </Panel>}
  </div>)}

function Compliance({emps,payroll,month,year}){
  const run=payroll.filter(p=>p.month===month&&p.year===year);
  const pfTotal=run.reduce((s,p)=>s+Number(p.pf_employee)+Number(p.pf_employer),0);
  const esicTotal=run.reduce((s,p)=>s+Number(p.esic_employee)+Number(p.esic_employer),0);
  const pfEmps=emps.filter(e=>e.pf_applicable&&e.active);
  const esicEmps=emps.filter(e=>e.esic_applicable&&e.active&&(Number(e.basic)+Number(e.hra)+Number(e.allowances))<=21000);
  return(<div style={{display:"flex",flexDirection:"column",gap:10}}>
    <div className="g2">
      <Panel title="PROVIDENT FUND (PF)">
        <div style={{display:"flex",justifyContent:"space-between",fontSize:11,padding:"8px 0",borderBottom:`1px solid ${C.border}`}}><span style={{color:C.label}}>Eligible Employees</span><span>{pfEmps.length}</span></div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:11,padding:"8px 0",borderBottom:`1px solid ${C.border}`}}><span style={{color:C.label}}>Employee Contribution (12%)</span><span>{fmt(run.reduce((s,p)=>s+Number(p.pf_employee),0))}</span></div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:11,padding:"8px 0",borderBottom:`1px solid ${C.border}`}}><span style={{color:C.label}}>Employer Contribution (12%)</span><span>{fmt(run.reduce((s,p)=>s+Number(p.pf_employer),0))}</span></div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:13,fontWeight:600,padding:"10px 0",color:C.em}}><span>TOTAL PF CHALLAN</span><span>{fmt(pfTotal)}</span></div>
        <div style={{fontSize:9,color:C.warn,padding:"8px 0",borderTop:`1px solid ${C.border}`}}>DUE: 15th {MONTHS[month-1]} {year} · File on EPFO portal</div>
      </Panel>
      <Panel title="ESIC">
        <div style={{display:"flex",justifyContent:"space-between",fontSize:11,padding:"8px 0",borderBottom:`1px solid ${C.border}`}}><span style={{color:C.label}}>Eligible Employees</span><span>{esicEmps.length}</span></div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:11,padding:"8px 0",borderBottom:`1px solid ${C.border}`}}><span style={{color:C.label}}>Employee Contribution (0.75%)</span><span>{fmt(run.reduce((s,p)=>s+Number(p.esic_employee),0))}</span></div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:11,padding:"8px 0",borderBottom:`1px solid ${C.border}`}}><span style={{color:C.label}}>Employer Contribution (3.25%)</span><span>{fmt(run.reduce((s,p)=>s+Number(p.esic_employer),0))}</span></div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:13,fontWeight:600,padding:"10px 0",color:C.em}}><span>TOTAL ESIC CHALLAN</span><span>{fmt(esicTotal)}</span></div>
        <div style={{fontSize:9,color:C.warn,padding:"8px 0",borderTop:`1px solid ${C.border}`}}>DUE: 15th {MONTHS[month-1]} {year} · File on ESIC portal</div>
      </Panel>
    </div>
  </div>)}

function Reports({emps,payroll,co,month,year}){
  const run=payroll.filter(p=>p.month===month&&p.year===year);
  const period=MONTHS[month-1]+" "+year;
  const rpts=[
    {l:"PAYROLL REGISTER",d:"Full salary sheet for "+period,
     fn:()=>printDoc("Payroll Register — "+period,co,["Employee","Designation","Basic","HRA","Allowances","Gross","PF (Emp)","ESIC (Emp)","Net Pay"],
       run.map(p=>{const e=emps.find(x=>x._dbid===p.employee_id);return[e?.name||"—",e?.designation||"—",fmt(p.basic),fmt(p.hra),fmt(p.allowances),fmt(Number(p.basic)+Number(p.hra)+Number(p.allowances)),fmt(p.pf_employee),fmt(p.esic_employee),fmt(p.net_pay)]}),
       `Total Net Payable: ${fmt(run.reduce((s,p)=>s+Number(p.net_pay),0))} | Total PF: ${fmt(run.reduce((s,p)=>s+Number(p.pf_employee)+Number(p.pf_employer),0))} | Total ESIC: ${fmt(run.reduce((s,p)=>s+Number(p.esic_employee)+Number(p.esic_employer),0))}`)},
    {l:"PF CHALLAN SUMMARY",d:"EPFO filing for "+period,
     fn:()=>printDoc("PF Challan — "+period,co,["Employee","UAN","Basic","PF (Employee 12%)","PF (Employer 12%)","Total PF"],
       run.filter(p=>p.pf_employee>0).map(p=>{const e=emps.find(x=>x._dbid===p.employee_id);return[e?.name||"—","—",fmt(p.basic),fmt(p.pf_employee),fmt(p.pf_employer),fmt(Number(p.pf_employee)+Number(p.pf_employer))]}),
       `Total PF Challan: ${fmt(run.reduce((s,p)=>s+Number(p.pf_employee)+Number(p.pf_employer),0))} | Due 15th ${MONTHS[month-1]} ${year}`)},
    {l:"ESIC CHALLAN SUMMARY",d:"ESIC filing for "+period,
     fn:()=>printDoc("ESIC Challan — "+period,co,["Employee","IP No","Gross","ESIC (Employee 0.75%)","ESIC (Employer 3.25%)","Total ESIC"],
       run.filter(p=>p.esic_employee>0).map(p=>{const e=emps.find(x=>x._dbid===p.employee_id);return[e?.name||"—","—",fmt(Number(p.basic)+Number(p.hra)+Number(p.allowances)),fmt(p.esic_employee),fmt(p.esic_employer),fmt(Number(p.esic_employee)+Number(p.esic_employer))]}),
       `Total ESIC Challan: ${fmt(run.reduce((s,p)=>s+Number(p.esic_employee)+Number(p.esic_employer),0))} | Due 15th ${MONTHS[month-1]} ${year}`)},
  ];
  return(<Panel title="DOCUMENT GENERATION">
    <div style={{fontSize:10,color:C.label,marginBottom:14,lineHeight:1.6}}>Generate PDF reports for payroll, PF challan, and ESIC challan. Run payroll first for the selected month.</div>
    <div className="g3">
      {rpts.map((r,i)=>(<div key={i} style={{background:C.bg2,border:`1px solid ${C.border2}`,padding:14}}>
        <div style={{fontSize:10,fontWeight:600,color:C.white,letterSpacing:1.5,marginBottom:5}}>{r.l}</div>
        <div style={{fontSize:9,color:C.label,marginBottom:12,lineHeight:1.5}}>{r.d}</div>
        <button onClick={r.fn} style={{...bP,fontSize:9,width:"100%"}}>GENERATE PDF →</button>
      </div>))}
    </div>
  </Panel>)}

function Config({co,setCo,pro,uid}){
  const save=async()=>{try{if(uid?.current)await sb.from("profiles").update({company_name:co}).eq("id",uid.current)}catch(e){}};
  return(<div className="g2">
    <Panel title="COMPANY PROFILE">
      <div style={{marginBottom:16}}><div style={{fontSize:8,color:C.label,letterSpacing:2,marginBottom:5}}>COMPANY / MILL NAME</div>
        <input value={co} onChange={e=>setCo(e.target.value)} placeholder="e.g. Maa Tarini Rice Mill" style={inp}/></div>
      <button onClick={save} style={{...bP,width:"100%"}}>SAVE</button>
    </Panel>
    <Panel title="MEMBERSHIP">
      {pro?(<div><div style={{fontSize:12,color:C.em,letterSpacing:2,marginBottom:8}}>PRO · ACTIVE</div>
        <div style={{fontSize:11,color:C.text,lineHeight:1.9}}>Unlimited employees · Full payroll · PF/ESIC challans · PDF reports</div></div>):(<div>
        {[["SINGLE UNIT","₹4,999/yr"],["MILL / FACTORY","₹14,999/yr"],["ENTERPRISE","₹49,999/yr"]].map((p,i)=>(
          <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:11,padding:"7px 0",borderBottom:i<2?`1px solid ${C.border}`:"none"}}><span style={{color:C.label}}>{p[0]}</span><span style={{color:C.em,fontWeight:500}}>{p[1]}</span></div>))}
        <a href="https://wa.me/917978474991?text=Hi, I want STAFFR Pro. Please share details." target="_blank" style={{...bP,display:"block",textAlign:"center",textDecoration:"none",marginTop:14}}>UPGRADE →</a>
      </div>)}
    </Panel>
  </div>)}

function EmpModal({emp,onClose,onSave,isMobile}){
  const[name,setName]=useState(emp?.name||"");
  const[desig,setDesig]=useState(emp?.designation||"");
  const[basic,setBasic]=useState(emp?.basic||"");
  const[hra,setHra]=useState(emp?.hra||"");
  const[allow,setAllow]=useState(emp?.allowances||"");
  const[pf,setPf]=useState(emp?.pf_applicable!==undefined?emp.pf_applicable:true);
  const[esic,setEsic]=useState(emp?.esic_applicable!==undefined?emp.esic_applicable:true);
  const gross=Number(basic||0)+Number(hra||0)+Number(allow||0);
  const save=()=>{if(!name||!basic){alert("Name and basic salary required");return}
    onSave({name,designation:desig,basic:Number(basic),hra:Number(hra||0),allowances:Number(allow||0),pf_applicable:pf,esic_applicable:esic,active:true,_dbid:emp?._dbid});onClose()};
  return(<div style={{position:"fixed",inset:0,background:"rgba(7,7,9,.9)",display:"flex",alignItems:isMobile?"flex-start":"center",justifyContent:"center",zIndex:1000,backdropFilter:"blur(4px)",padding:isMobile?0:16,overflow:"auto"}}>
    <div className="min" style={{background:C.bg,border:`1px solid ${C.emS}`,width:440,maxWidth:"100%",minHeight:isMobile?"100vh":"auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"13px 16px",borderBottom:`1px solid ${C.border2}`,position:"sticky",top:0,background:C.bg}}>
        <span style={{fontWeight:600,letterSpacing:3,fontSize:10,color:C.em}}>{emp?"EDIT EMPLOYEE":"ADD EMPLOYEE"}</span>
        <button onClick={onClose} style={{background:"none",border:"none",fontSize:18,cursor:"pointer",color:C.label}}>✕</button>
      </div>
      <div style={{padding:16}}>
        <div className="g2" style={{marginBottom:10}}>
          <div><div style={{fontSize:8,color:C.label,letterSpacing:2,marginBottom:4}}>FULL NAME *</div><input value={name} onChange={e=>setName(e.target.value)} placeholder="Employee name" style={inp}/></div>
          <div><div style={{fontSize:8,color:C.label,letterSpacing:2,marginBottom:4}}>DESIGNATION</div><input value={desig} onChange={e=>setDesig(e.target.value)} placeholder="e.g. Machine Operator" style={inp}/></div>
        </div>
        <div className="g3" style={{marginBottom:10}}>
          <div><div style={{fontSize:8,color:C.label,letterSpacing:2,marginBottom:4}}>BASIC (₹/mo) *</div><input type="number" value={basic} onChange={e=>setBasic(e.target.value)} placeholder="0" style={inp}/></div>
          <div><div style={{fontSize:8,color:C.label,letterSpacing:2,marginBottom:4}}>HRA (₹/mo)</div><input type="number" value={hra} onChange={e=>setHra(e.target.value)} placeholder="0" style={inp}/></div>
          <div><div style={{fontSize:8,color:C.label,letterSpacing:2,marginBottom:4}}>ALLOWANCES</div><input type="number" value={allow} onChange={e=>setAllow(e.target.value)} placeholder="0" style={inp}/></div>
        </div>
        <div className="g2" style={{marginBottom:14}}>
          <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:10,color:C.text}}>
            <input type="checkbox" checked={pf} onChange={e=>setPf(e.target.checked)} style={{accentColor:C.em}}/>PF APPLICABLE</label>
          <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:10,color:C.text}}>
            <input type="checkbox" checked={esic} onChange={e=>setEsic(e.target.checked)} style={{accentColor:C.em}}/>ESIC APPLICABLE</label>
        </div>
        <div style={{padding:12,background:C.panel,border:`1px solid ${C.border}`,marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:10,padding:"3px 0"}}><span style={{color:C.label}}>Gross Monthly</span><span style={{fontWeight:500}}>{fmt(gross)}</span></div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:10,padding:"3px 0"}}><span style={{color:C.label}}>PF Deduction</span><span>{pf?fmt(Math.round(Number(basic||0)*0.12)):"—"}</span></div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:10,padding:"3px 0"}}><span style={{color:C.label}}>ESIC Deduction</span><span>{esic&&gross<=21000?fmt(Math.round(gross*0.0075)):"—"}</span></div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:C.em,fontWeight:600,padding:"6px 0 0",borderTop:`1px solid ${C.border}`,marginTop:4}}><span>NET TAKE-HOME</span><span>{fmt(gross-(pf?Math.round(Number(basic||0)*0.12):0)-(esic&&gross<=21000?Math.round(gross*0.0075):0))}</span></div>
        </div>
        <button onClick={save} style={{...bP,width:"100%"}}>SAVE EMPLOYEE</button>
      </div>
    </div></div>)}

const bP={background:C.em,color:"#0A0A0C",border:"none",fontFamily:"inherit",fontWeight:600,fontSize:10,letterSpacing:2,padding:"10px 16px",cursor:"pointer"};
const inp={background:C.bg3,border:`1px solid ${C.border2}`,color:C.white,fontFamily:"inherit",fontSize:13,padding:"10px 11px",outline:"none",width:"100%"};
const tbl={width:"100%",borderCollapse:"collapse",fontSize:11,minWidth:400};
const trH={color:C.dim,fontSize:8,letterSpacing:1.5,textAlign:"left",borderBottom:`1px solid ${C.border2}`};
const th={padding:"9px 6px",fontWeight:500};
const thR={...th,textAlign:"right"};
const thC={...th,textAlign:"center"};
const td={padding:"11px 6px",color:C.text};
const tdR={...td,textAlign:"right"};
const tdC={...td,textAlign:"center"};

function STAFFR(){
  const[active,setActive]=useState("dash");
  const[pro,setPro]=useState(false);
  const[godPro,setGodPro]=useState(()=>localStorage.getItem("staffr_god")==="1");
  const[emps,setEmps]=useState([]);
  const[payroll,setPayroll]=useState([]);
  const[co,setCo]=useState("");
  const[loading,setLoading]=useState(true);
  const[showSecret,setShowSecret]=useState(false);
  const[showEmp,setShowEmp]=useState(false);
  const[editEmp,setEditEmp]=useState(null);
  const[month,setMonth]=useState(CUR_MONTH);
  const[year,setYear]=useState(CUR_YEAR);
  const uid=useRef(null);
  const isMobile=useIsMobile();
  const isProActive=pro||godPro;
  const walled=!isProActive&&emps.filter(e=>e.active).length>=FREE_EMP;

  useEffect(()=>{(async()=>{
    try{
      const{data:{user}}=await sb.auth.getUser();
      if(!user){setLoading(false);return}
      uid.current=user.id||user.sub;
      try{const{data:p}=await sb.from("profiles").select("*").eq("id",uid.current).single();
        if(p){if(p.is_pro)setPro(true);if(p.company_name)setCo(p.company_name)}}catch(e){}
      try{const{data:d}=await sb.from("employees").select("*").eq("user_id",uid.current).order("created_at",{ascending:true});
        if(d&&Array.isArray(d))setEmps(d.map(e=>({...e,_dbid:e.id})))}catch(e){}
      try{const{data:d}=await sb.from("payroll_runs").select("*").eq("user_id",uid.current);
        if(d&&Array.isArray(d))setPayroll(d.map(p=>({...p,_dbid:p.id})))}catch(e){}
    }catch(e){}
    setLoading(false);
  })()},[]);

  const saveEmp=async e=>{
    if(e._dbid){
      setEmps(p=>p.map(x=>x._dbid===e._dbid?{...x,...e}:x));
      try{await sb.from("employees").update({name:e.name,designation:e.designation,basic:e.basic,hra:e.hra,allowances:e.allowances,pf_applicable:e.pf_applicable,esic_applicable:e.esic_applicable}).eq("id",e._dbid)}catch(err){}
    }else{
      try{if(uid.current){const{data:d}=await sb.from("employees").insert({user_id:uid.current,name:e.name,designation:e.designation,basic:e.basic,hra:e.hra,allowances:e.allowances,pf_applicable:e.pf_applicable,esic_applicable:e.esic_applicable,active:true});
        if(d)setEmps(p=>[...p,{...e,_dbid:d[0]?.id}])}}catch(err){}}};

  const runPayroll=async(m,y)=>{
    const active=emps.filter(e=>e.active);
    const rows=active.map(e=>{const c=calcPay(e,26,26);return{user_id:uid.current,employee_id:e._dbid,month:m,year:y,...c}});
    try{const{data:d}=await sb.from("payroll_runs").insert(rows);
      if(d)setPayroll(p=>[...p,...d.map(x=>({...x,_dbid:x.id}))])}catch(e){}};

  const unlockPro=async()=>{setPro(true);try{if(uid.current)await sb.from("profiles").update({is_pro:true}).eq("id",uid.current)}catch(e){}};
  const unlockGod=()=>{setGodPro(true);localStorage.setItem("staffr_god","1")};

  if(loading)return(<div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",color:C.label,fontSize:10,letterSpacing:3}}>LOADING STAFFR...</div>);

  const NavBtn=({m})=>(<button onClick={()=>setActive(m.id)} style={{display:"flex",alignItems:"center",padding:isMobile?"9px 12px":"11px 18px",width:isMobile?"auto":"100%",background:"transparent",border:"none",borderLeft:isMobile?"none":(active===m.id?`1px solid ${C.em}`:"1px solid transparent"),borderBottom:isMobile?(active===m.id?`2px solid ${C.em}`:"2px solid transparent"):"none",color:active===m.id?C.em:C.label,fontFamily:"inherit",fontSize:9,letterSpacing:2,cursor:"pointer",textAlign:"left",whiteSpace:"nowrap"}}>{m.l}</button>);

  const render=()=>{switch(active){
    case"dash":return<Dashboard emps={emps} payroll={payroll}/>;
    case"employees":return<Employees emps={emps} onAdd={()=>{setEditEmp(null);setShowEmp(true)}} onEdit={e=>{setEditEmp(e);setShowEmp(true)}} pro={pro} godPro={godPro}/>;
    case"payroll":return<PayrollRun emps={emps} payroll={payroll} onRun={runPayroll} month={month} setMonth={setMonth} year={year} setYear={setYear}/>;
    case"compliance":return<Compliance emps={emps} payroll={payroll} month={month} year={year}/>;
    case"reports":return<Reports emps={emps} payroll={payroll} co={co} month={month} year={year}/>;
    case"config":return<Config co={co} setCo={setCo} pro={isProActive} uid={uid}/>;
    default:return null}};

  return(<div style={{background:C.bg,color:C.text,minHeight:"100vh",fontSize:12}}>
    <StatusBar pro={isProActive} onSecret={()=>setShowSecret(true)} onLogout={async()=>{await sb.auth.signOut();location.reload()}}/>
    <Ticker/>
    {isMobile&&<div style={{display:"flex",overflowX:"auto",background:"#070709",borderBottom:`1px solid ${C.border}`,WebkitOverflowScrolling:"touch"}}>
      {MODS.map(m=><NavBtn key={m.id} m={m}/>)}</div>}
    <div style={{display:"flex",minHeight:"calc(100vh - 72px)"}}>
      {!isMobile&&<div style={{width:168,background:"#070709",borderRight:`1px solid ${C.border}`,padding:"14px 0",flexShrink:0}}>
        {MODS.map(m=><NavBtn key={m.id} m={m}/>)}
        <div style={{padding:"16px 18px",marginTop:16,borderTop:`1px solid ${C.border}`}}>
          <div style={{fontSize:8,color:C.dim,letterSpacing:2,marginBottom:6}}>MEMBERSHIP</div>
          <div style={{fontSize:10,color:C.em,letterSpacing:1}}>{isProActive?"PRO":"FREE"}</div>
          <div style={{fontSize:8,color:C.label,marginTop:4}}>{isProActive?"Unlimited access":`${Math.max(0,FREE_EMP-emps.filter(e=>e.active).length)} free employees left`}</div>
        </div>
      </div>}
      <div style={{flex:1,padding:14,overflow:"hidden",minWidth:0}} className={walled?"blurred":""}>
        <div style={{marginBottom:14}}>
          <h1 style={{fontSize:14,fontWeight:600,letterSpacing:2,color:C.white}}>{MODS.find(m=>m.id===active)?.l}</h1>
          <div style={{fontSize:9,color:C.label,marginTop:4,letterSpacing:1}}>STAFFR · LABOUR & PAYROLL COMPLIANCE · {co||"SET COMPANY NAME IN CONFIG"}</div>
        </div>
        {render()}
      </div>
    </div>
    {walled&&<Paywall onUnlock={unlockPro}/>}
    {showSecret&&<SecretEntry onClose={()=>setShowSecret(false)} onUnlock={unlockGod}/>}
    {showEmp&&<EmpModal emp={editEmp} onClose={()=>setShowEmp(false)} onSave={saveEmp} isMobile={isMobile}/>}
  </div>)}

function App(){
  const[session,setSession]=useState(undefined);
  useEffect(()=>{
    sb.auth.getSession().then(({data})=>setSession(data.session));
    const{data:sub}=sb.auth.onAuthStateChange((_e,s)=>setSession(s));
    return()=>sub.subscription.unsubscribe();
  },[]);
  if(session===undefined)return(<div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",color:C.label,fontSize:10,letterSpacing:3}}>INITIALIZING...</div>);
  if(!session)return<AuthGate onAuthed={()=>location.reload()}/>;
  return<STAFFR key={session?.user?.id||"app"}/>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
